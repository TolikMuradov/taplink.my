<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Appearance Settings | Taplink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script defer="" src="https://unpkg.com/alpinejs"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        [x-cloak] { display: none !important; }
        
        /* Custom scrollbar for editor */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #464554;
            border-radius: 10px;
        }
        
        /* Glassmorphism utility */
        .glass-card {
            background: rgba(31, 31, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(144, 143, 160, 0.2);
        }

        .phone-mockup {
            aspect-ratio: 9 / 19;
            width: 100%;
            max-width: 320px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#13131b",
                        "surface-container-low": "#1b1b23",
                        "error": "#ffb4ab",
                        "outline": "#908fa0",
                        "on-primary-container": "#0d0096",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-secondary-container": "#b2b3f2",
                        "surface-tint": "#c0c1ff",
                        "on-surface-variant": "#c7c4d7",
                        "secondary": "#c0c1ff",
                        "primary-container": "#8083ff",
                        "inverse-surface": "#e4e1ed",
                        "surface-container-highest": "#34343d",
                        "primary-fixed-dim": "#c0c1ff",
                        "outline-variant": "#464554",
                        "surface-bright": "#393841",
                        "on-tertiary": "#4f2500",
                        "on-secondary-fixed": "#13144a",
                        "on-surface": "#e4e1ed",
                        "on-secondary-fixed-variant": "#404178",
                        "on-primary-fixed": "#07006c",
                        "tertiary-fixed": "#ffdcc5",
                        "surface-variant": "#34343d",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-background": "#e4e1ed",
                        "primary-fixed": "#e1e0ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "surface-container-high": "#292932",
                        "background": "#13131b",
                        "surface": "#13131b",
                        "tertiary-container": "#d97721",
                        "surface-container": "#1f1f27",
                        "secondary-fixed-dim": "#c0c1ff",
                        "secondary-container": "#42447b",
                        "on-primary": "#1000a9",
                        "on-tertiary-fixed": "#301400",
                        "inverse-primary": "#494bd6",
                        "surface-container-lowest": "#0d0d15",
                        "on-error-container": "#ffdad6",
                        "secondary-fixed": "#e1e0ff",
                        "primary": "#c0c1ff",
                        "on-secondary": "#292a60",
                        "on-tertiary-container": "#452000",
                        "on-error": "#690005",
                        "tertiary": "#ffb783",
                        "inverse-on-surface": "#303038"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "1.5rem",
                        "sm": "0.5rem",
                        "container-max": "640px",
                        "xl": "2rem",
                        "gutter": "1rem",
                        "2xl": "3rem",
                        "xs": "0.25rem",
                        "md": "1rem"
                    },
                    "fontFamily": {
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "display": ["Inter"],
                        "body-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-dim text-on-surface font-body-md overflow-hidden" x-data="{ 
    activeTab: 'Appearance',
    profileShape: 'Circle',
    displayName: 'Alex Sterling',
    bio: 'Digital Architect & Creative Technologist',
    location: 'San Francisco, CA',
    bgType: 'Color',
    bgColor: '#13131b',
    btnStyle: 'Soft',
    borderRadius: '12',
    activeFont: 'Inter',
    fontSize: 'Medium'
}">
<!-- SideNavBar (Shared Component) -->
<aside class="fixed left-0 top-0 h-screen hidden md:flex flex-col p-md z-40 bg-surface-container-low border-r border-outline-variant w-[240px]">
<div class="mb-xl px-4">
<h1 class="text-headline-md font-headline-md font-bold text-on-surface">Taplink</h1>
<p class="text-label-md font-label-md text-on-surface-variant opacity-70">Creator Dashboard</p>
</div>
<nav class="flex-1 space-y-sm">
<template :key="label" x-for="(label, index) in ['Links', 'Appearance', 'Analytics', 'Settings']">
<button :class="activeTab === label ? 'flex items-center gap-md bg-secondary-container text-on-secondary-container rounded-lg px-4 py-3' : 'flex items-center gap-md text-on-surface-variant hover:bg-surface-container-highest rounded-lg px-4 py-3'" @click="activeTab = label" class="w-full transition-all duration-200 ease-in-out font-label-md text-label-md">
<span class="material-symbols-outlined" x-text="['link', 'palette', 'leaderboard', 'settings'][index]"></span>
<span x-text="label"></span>
</button>
</template>
</nav>
<div class="mt-auto pt-md border-t border-outline-variant space-y-sm">
<button class="w-full flex items-center gap-md text-on-surface-variant hover:bg-surface-container-highest rounded-lg px-4 py-3 transition-all">
<span class="material-symbols-outlined">help</span>
<span class="font-label-md text-label-md">Help</span>
</button>
<button class="w-full flex items-center gap-md text-on-surface-variant hover:bg-surface-container-highest rounded-lg px-4 py-3 transition-all text-error">
<span class="material-symbols-outlined">logout</span>
<span class="font-label-md text-label-md">Logout</span>
</button>
</div>
</aside>
<!-- Main Content Layout -->
<main class="md:ml-[240px] flex flex-col md:flex-row h-screen">
<!-- Editor Area (Center) -->
<section class="flex-1 flex flex-col h-full bg-surface-dim relative overflow-hidden">
<!-- Header Tab Nav -->
<div class="flex items-center gap-xl px-xl h-16 border-b border-outline-variant bg-surface/80 backdrop-blur-md sticky top-0 z-10">
<template :key="tab" x-for="tab in ['Links', 'Appearance', 'Analytics', 'Settings']">
<button :class="activeTab === tab ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant'" @click="activeTab = tab" class="h-full px-2 flex items-center transition-colors text-body-md font-body-md" x-text="tab"></button>
</template>
</div>
<!-- Appearance Content (Accordion) -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-xl pb-32">
<div class="max-w-2xl mx-auto space-y-lg" x-data="{ openSection: 'profile' }">
<!-- Section: Profile -->
<div class="bg-surface-container rounded-xl overflow-hidden border border-outline-variant">
<button @click="openSection = openSection === 'profile' ? null : 'profile'" class="w-full flex items-center justify-between p-lg hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">account_circle</span>
<h3 class="text-headline-md font-headline-md">Profile</h3>
</div>
<span :class="openSection === 'profile' ? 'rotate-180' : ''" class="material-symbols-outlined transition-transform duration-300">expand_more</span>
</button>
<div class="p-lg pt-0 space-y-lg" x-collapse="" x-show="openSection === 'profile'">
<!-- Avatar Upload -->
<div class="flex flex-col items-center justify-center p-xl border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low hover:border-primary transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary mb-sm text-4xl">add_a_photo</span>
<p class="text-body-sm font-body-sm text-on-surface-variant">Drop image here</p>
</div>
<!-- Shape Selector -->
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant uppercase tracking-wider">Avatar Shape</label>
<div class="grid grid-cols-3 gap-md">
<template :key="shape" x-for="shape in ['Circle', 'Square', 'Hexagon']">
<button :class="profileShape === shape ? 'bg-secondary-container text-on-secondary-container ring-1 ring-primary' : 'bg-surface-container-highest text-on-surface-variant hover:bg-surface-bright'" @click="profileShape = shape" class="py-3 rounded-lg flex flex-col items-center gap-xs transition-all">
<div :class="{
                                                'w-8 h-8 bg-current opacity-20': true,
                                                'rounded-full': shape === 'Circle',
                                                'rounded-md': shape === 'Square',
                                                'clip-path-hexagon': shape === 'Hexagon'
                                            }"></div>
<span class="text-label-md" x-text="shape"></span>
</button>
</template>
</div>
</div>
<!-- Inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant">Display Name</label>
<input class="w-full bg-surface-container-lowest border-outline-variant rounded-lg focus:ring-primary focus:border-primary text-body-md py-3" type="text" x-model="displayName"/>
</div>
<div class="space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant">Location</label>
<input class="w-full bg-surface-container-lowest border-outline-variant rounded-lg focus:ring-primary focus:border-primary text-body-md py-3" type="text" x-model="location"/>
</div>
<div class="md:col-span-2 space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant">Bio</label>
<textarea class="w-full bg-surface-container-lowest border-outline-variant rounded-lg focus:ring-primary focus:border-primary text-body-md py-3" rows="3" x-model="bio"></textarea>
</div>
</div>
<!-- Verified Toggle (Locked) -->
<div class="flex items-center justify-between p-md bg-surface-container-lowest rounded-lg opacity-60 cursor-not-allowed">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-tertiary">verified</span>
<div>
<p class="text-body-md font-bold">Verified Badge</p>
<p class="text-body-sm text-on-surface-variant">Available for Pro accounts</p>
</div>
</div>
<span class="material-symbols-outlined">lock</span>
</div>
</div>
</div>
<!-- Section: Background -->
<div class="bg-surface-container rounded-xl overflow-hidden border border-outline-variant">
<button @click="openSection = openSection === 'background' ? null : 'background'" class="w-full flex items-center justify-between p-lg hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">wallpaper</span>
<h3 class="text-headline-md font-headline-md">Background</h3>
</div>
<span :class="openSection === 'background' ? 'rotate-180' : ''" class="material-symbols-outlined transition-transform duration-300">expand_more</span>
</button>
<div class="p-lg pt-0 space-y-lg" x-collapse="" x-show="openSection === 'background'">
<div class="flex p-1 bg-surface-container-lowest rounded-lg">
<template :key="type" x-for="type in ['Color', 'Gradient', 'Image', 'Video']">
<button :class="bgType === type ? 'bg-surface-container-highest text-primary shadow-sm' : 'text-on-surface-variant hover:text-on-surface'" @click="bgType = type" class="flex-1 py-2 text-label-md font-label-md rounded-md transition-all" x-text="type"></button>
</template>
</div>
<div class="flex items-center gap-md p-md bg-surface-container-lowest rounded-xl" x-show="bgType === 'Color'">
<input class="w-12 h-12 bg-transparent border-none rounded-lg cursor-pointer" type="color" x-model="bgColor"/>
<div class="flex-1">
<p class="text-label-md text-on-surface-variant mb-1">Pick a color</p>
<input class="w-full bg-surface-container-highest border-none rounded p-1 text-label-md font-mono uppercase" type="text" x-model="bgColor"/>
</div>
</div>
</div>
</div>
<!-- Section: Buttons -->
<div class="bg-surface-container rounded-xl overflow-hidden border border-outline-variant">
<button @click="openSection = openSection === 'buttons' ? null : 'buttons'" class="w-full flex items-center justify-between p-lg hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">smart_button</span>
<h3 class="text-headline-md font-headline-md">Buttons</h3>
</div>
<span :class="openSection === 'buttons' ? 'rotate-180' : ''" class="material-symbols-outlined transition-transform duration-300">expand_more</span>
</button>
<div class="p-lg pt-0 space-y-lg" x-collapse="" x-show="openSection === 'buttons'">
<div class="grid grid-cols-2 md:grid-cols-3 gap-md">
<template :key="style" x-for="style in ['Filled', 'Outline', 'Soft', 'Shadow', 'Glass', 'Gradient']">
<button :class="btnStyle === style ? 'border-primary ring-1 ring-primary' : 'border-outline-variant'" @click="btnStyle = style" class="p-4 rounded-xl border bg-surface-container-lowest flex flex-col items-center gap-sm group transition-all">
<div :class="{
                                            'w-full h-8 rounded-md': true,
                                            'bg-primary': style === 'Filled',
                                            'border-2 border-primary': style === 'Outline',
                                            'bg-primary/20': style === 'Soft',
                                            'bg-primary shadow-[0_4px_10px_rgba(192,193,255,0.4)]': style === 'Shadow',
                                            'bg-white/10 backdrop-blur-sm border border-white/20': style === 'Glass',
                                            'bg-gradient-to-r from-primary to-secondary': style === 'Gradient'
                                        }"></div>
<span class="text-label-md" x-text="style"></span>
</button>
</template>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant">Border Radius</label>
<span class="text-label-md font-bold text-primary" x-text="borderRadius + 'px'"></span>
</div>
<input class="w-full h-2 bg-surface-container-lowest rounded-lg appearance-none cursor-pointer accent-primary" max="40" min="0" type="range" x-model="borderRadius"/>
</div>
</div>
</div>
<!-- Section: Typography -->
<div class="bg-surface-container rounded-xl overflow-hidden border border-outline-variant">
<button @click="openSection = openSection === 'typography' ? null : 'typography'" class="w-full flex items-center justify-between p-lg hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-primary">text_fields</span>
<h3 class="text-headline-md font-headline-md">Typography</h3>
</div>
<span :class="openSection === 'typography' ? 'rotate-180' : ''" class="material-symbols-outlined transition-transform duration-300">expand_more</span>
</button>
<div class="p-lg pt-0 space-y-lg" x-collapse="" x-show="openSection === 'typography'">
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">search</span>
<input class="w-full bg-surface-container-lowest border-outline-variant rounded-lg pl-10 py-3 text-body-md focus:ring-primary focus:border-primary" placeholder="Search fonts..." type="text"/>
</div>
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant">Popular Fonts</label>
<div class="flex flex-wrap gap-sm">
<template :key="font" x-for="font in ['Inter', 'Poppins', 'Kanit', 'Montserrat', 'Roboto Mono']">
<button :class="activeFont === font ? 'bg-primary text-on-primary' : 'bg-surface-container-highest text-on-surface-variant hover:text-on-surface'" @click="activeFont = font" class="px-4 py-2 rounded-full text-label-md transition-all" x-text="font"></button>
</template>
</div>
</div>
<div class="space-y-sm">
<label class="text-label-md font-label-md text-on-surface-variant">Size Presets</label>
<div class="grid grid-cols-3 gap-md">
<template :key="size" x-for="size in ['Small', 'Medium', 'Large']">
<button :class="fontSize === size ? 'bg-secondary-container text-on-secondary-container ring-1 ring-primary' : 'bg-surface-container-highest text-on-surface-variant'" @click="fontSize = size" class="py-3 rounded-lg text-label-md transition-all" x-text="size"></button>
</template>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Sticky Bottom Save -->
<div class="absolute bottom-0 inset-x-0 p-lg bg-surface-dim/80 backdrop-blur-xl border-t border-outline-variant flex justify-center z-20">
<button class="w-full max-w-2xl bg-primary text-on-primary font-headline-md py-4 rounded-xl shadow-[0_0_20px_rgba(192,193,255,0.3)] hover:brightness-110 active:scale-[0.98] transition-all">
                    Save changes
                </button>
</div>
</section>
<!-- Live Preview Panel (Right) -->
<section class="hidden lg:flex flex-[0.6] bg-surface-container-low border-l border-outline-variant flex-col items-center justify-center p-gutter relative">
<div class="absolute top-md right-md flex items-center gap-md">
<button class="p-2 rounded-lg hover:bg-surface-container-highest transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">qr_code</span>
</button>
<button class="p-2 rounded-lg hover:bg-surface-container-highest transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">open_in_new</span>
</button>
</div>
<div class="text-center mb-xl">
<p class="text-label-md font-label-md text-on-surface-variant uppercase tracking-widest mb-2">Live Preview</p>
<div class="w-24 h-1 bg-primary mx-auto rounded-full opacity-30"></div>
</div>
<!-- Phone Mockup -->
<div class="phone-mockup bg-black rounded-[3rem] p-3 border-[6px] border-[#222] shadow-2xl overflow-hidden relative group">
<!-- Notch -->
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-6 bg-black rounded-b-2xl z-20"></div>
<!-- Phone Screen Content -->
<div :style="'background-color: ' + bgColor" class="h-full w-full rounded-[2.5rem] overflow-y-auto custom-scrollbar flex flex-col items-center pt-12 pb-12 px-6">
<!-- Avatar Preview -->
<div class="relative mb-lg">
<div :class="{
                                'rounded-full': profileShape === 'Circle',
                                'rounded-2xl': profileShape === 'Square',
                                'clip-path-hexagon': profileShape === 'Hexagon'
                            }" class="w-24 h-24 bg-surface-container-highest flex items-center justify-center overflow-hidden border-2 border-primary/30">
<img alt="Avatar" class="w-full h-full object-cover" data-alt="A professional studio portrait of a modern creative professional with a confident smile, set against a dark minimalist background. The lighting is moody and dramatic with soft indigo rim highlights, matching a sleek tech-focused aesthetic. High definition photography style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2Lk9FCi0JdJexD7-PT806GpKJUzIsb2yWTg7sCJTeoMHUx7D7S6by6wBTcV0nkjgFpOgCyZMd-Kno6erR8KhroPCZAapTcVeBK-HuqHOGKLVd5KI4m1iIv0MzrArz-S8wR_ZBdbT-Azn83NkfBNYpi1h4GpniOe0RrZWqfwDA1zvhvJJLlDKXRccsGOzaQreYcogrCYyhw_Cxdk2ytPGWuDueZw64LMPv2QXHIWYqfFshDPwO7RhFFU62emTHZUuVLaeP6ymZhn8"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-on-primary w-6 h-6 rounded-full flex items-center justify-center shadow-lg border-2 border-black">
<span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
<!-- Identity Preview -->
<div class="text-center mb-xl space-y-1">
<h2 class="text-headline-md font-bold leading-tight" x-text="displayName"></h2>
<p class="text-body-sm opacity-80" x-text="bio"></p>
<div class="flex items-center justify-center gap-1 text-label-md opacity-60">
<span class="material-symbols-outlined text-[12px]">location_on</span>
<span x-text="location"></span>
</div>
</div>
<!-- Buttons Preview -->
<div class="w-full space-y-md">
<template :key="item" x-for="item in ['Portfolio', 'GitHub', 'LinkedIn', 'Book a Consultation']">
<div :class="{
                                    'bg-primary text-on-primary shadow-lg': btnStyle === 'Filled' || btnStyle === 'Shadow',
                                    'border-2 border-primary text-primary': btnStyle === 'Outline',
                                    'bg-primary/20 text-primary': btnStyle === 'Soft',
                                    'bg-white/10 backdrop-blur-md border border-white/20 text-white': btnStyle === 'Glass',
                                    'bg-gradient-to-r from-primary to-secondary text-on-primary': btnStyle === 'Gradient'
                                }" :style="'border-radius: ' + borderRadius + 'px;'" class="w-full py-4 px-6 flex items-center justify-between transition-all duration-300 font-bold">
<span class="text-body-md" x-text="item"></span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</div>
</template>
</div>
<!-- Footer Preview -->
<div class="mt-auto pt-xl">
<p class="text-label-md font-bold text-primary tracking-widest">TAPLINK</p>
</div>
</div>
</div>
<p class="mt-lg text-body-sm text-on-surface-variant italic">Live changes reflect instantly</p>
</section>
</main>
<!-- Mobile Navigation Shell (BottomNavBar) -->
<nav class="fixed bottom-0 left-0 right-0 h-16 bg-surface/80 backdrop-blur-md border-t border-outline-variant flex md:hidden items-center justify-around px-gutter z-50">
<button class="flex flex-col items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined">link</span>
<span class="text-[10px] font-bold uppercase">Links</span>
</button>
<button class="flex flex-col items-center gap-xs text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">palette</span>
<span class="text-[10px] font-bold uppercase">Style</span>
</button>
<button class="flex flex-col items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-bold uppercase">Stats</span>
</button>
<button class="flex flex-col items-center gap-xs text-on-surface-variant">
