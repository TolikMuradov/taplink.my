<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Taplink</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script defer="" src="https://unpkg.com/alpinejs"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#e4e1ed",
                        "on-primary": "#1000a9",
                        "tertiary-fixed": "#ffdcc5",
                        "outline": "#908fa0",
                        "secondary-container": "#42447b",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-tertiary": "#4f2500",
                        "primary-container": "#8083ff",
                        "tertiary": "#ffb783",
                        "on-tertiary-fixed": "#301400",
                        "surface-container-low": "#1b1b23",
                        "tertiary-container": "#d97721",
                        "on-secondary": "#292a60",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-container-highest": "#34343d",
                        "error-container": "#93000a",
                        "surface-bright": "#393841",
                        "on-tertiary-container": "#452000",
                        "surface-variant": "#34343d",
                        "surface": "#13131b",
                        "background": "#13131b",
                        "inverse-primary": "#494bd6",
                        "on-primary-fixed": "#07006c",
                        "on-error": "#690005",
                        "on-surface": "#e4e1ed",
                        "inverse-on-surface": "#303038",
                        "on-primary-container": "#0d0096",
                        "surface-container-lowest": "#0d0d15",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#703700",
                        "on-background": "#e4e1ed",
                        "on-secondary-fixed": "#13144a",
                        "on-secondary-container": "#b2b3f2",
                        "surface-container-high": "#292932",
                        "surface-tint": "#c0c1ff",
                        "secondary-fixed-dim": "#c0c1ff",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-surface-variant": "#c7c4d7",
                        "secondary-fixed": "#e1e0ff",
                        "secondary": "#c0c1ff",
                        "on-secondary-fixed-variant": "#404178",
                        "outline-variant": "#464554",
                        "surface-container": "#1f1f27",
                        "error": "#ffb4ab",
                        "primary-fixed": "#e1e0ff",
                        "primary": "#c0c1ff",
                        "surface-dim": "#13131b"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "2xl": "3rem",
                        "gutter": "1rem",
                        "xl": "2rem",
                        "lg": "1.5rem",
                        "xs": "0.25rem",
                        "container-max": "640px",
                        "md": "1rem",
                        "sm": "0.5rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "display": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],

                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "body-sm": ["14px", {"lineHeight": "1.4", "fontWeight": "400"}],
                        "label-md": ["12px", {"lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "fontWeight": "700"}]
                    }
                },
            },
        }

<style>
        body {
            background-color: #0a0a0a;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .glass-card {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(144, 143, 160, 0.1);
        }
        .brand-glow-primary:hover {
            box-shadow: 0 0 20px rgba(192, 193, 255, 0.3);
        }
        .brand-glow-google:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-gutter text-on-surface">
<!-- Login Container -->
<main class="w-full max-w-[400px] flex flex-col items-center" x-data="{ mode: 'production' }">
<!-- Brand Logo (Shared Component Style Mapping) -->
<div class="mb-xl flex flex-col items-center gap-sm">
<span class="text-headline-md font-headline-lg-mobile font-bold text-on-surface">Taplink</span>
<p class="text-on-surface-variant font-body-sm text-body-sm">Sign in to your dashboard</p>
</div>
<!-- Auth Card -->
<div class="glass-card w-full rounded-xl p-xl shadow-sm transition-all duration-300">
<!-- Mode Toggle (For Demo Purposes) -->
<div class="flex bg-surface-container-low p-xs rounded-lg mb-lg">
<button :class="mode === 'production' ? 'bg-surface-container-highest text-on-surface shadow-sm' : 'text-on-surface-variant'" @click="mode = 'production'" class="flex-1 py-2 rounded-md font-label-md text-label-md transition-all">
                    Production
                </button>
<button :class="mode === 'development' ? 'bg-surface-container-highest text-on-surface shadow-sm' : 'text-on-surface-variant'" @click="mode = 'development'" class="flex-1 py-2 rounded-md font-label-md text-label-md transition-all">
                    Developer
                </button>
</div>
<!-- Production Content: Social Login -->
<div class="space-y-md" x-show="mode === 'production'" x-transition:enter="transition ease-out duration-200" x-transition:enter-end="opacity-100 translate-y-0" x-transition:enter-start="opacity-0 translate-y-2">
<button class="w-full bg-white text-black py-3 px-4 rounded-lg flex items-center justify-center gap-md font-headline-md font-bold transition-all hover:scale-[0.98] active:scale-95 brand-glow-google">
<!-- Custom SVG for Google 'G' to match prompt requirements -->
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-on-surface-variant font-label-md text-label-md">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-surface-container-high text-on-surface py-3 px-4 rounded-lg flex items-center justify-center gap-md font-body-md font-body-md border border-outline-variant transition-all hover:bg-surface-container-highest">
<span class="material-symbols-outlined" data-icon="mail">mail</span>
                    Continue with Email
                </button>
</div>
<!-- Development Content: Email/Password -->
<div class="space-y-lg" x-show="mode === 'development'" x-transition:enter="transition ease-out duration-200" x-transition:enter-end="opacity-100 translate-y-0" x-transition:enter-start="opacity-0 translate-y-2">
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant">Email Address</label>
<input class="w-full bg-[#0a0a0a] border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline" placeholder="dev@taplink.my" type="email"/>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface-variant">Password</label>
<a class="text-primary font-label-md text-label-md hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full bg-[#0a0a0a] border-outline-variant rounded-lg px-4 py-3 text-on-surface focus:ring-1 focus:ring-primary-container focus:border-primary-container outline-none transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-primary-container text-on-primary-container py-3 px-4 rounded-lg font-headline-md font-bold transition-all hover:scale-[0.98] active:scale-95 brand-glow-primary">
                    Log in
                </button>
<p class="text-center text-on-surface-variant font-body-sm text-body-sm">
                    Don't have an account? <a class="text-primary font-bold hover:underline" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Footer Links (Shared Component Structure) -->
<footer class="mt-xl w-full flex flex-col items-center gap-md text-center">
<div class="flex gap-lg">
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors" href="#">Contact Support</a>
</div>
<p class="text-on-surface-variant font-body-sm text-body-sm opacity-60">
                © 2024 Taplink. All rights reserved.
            </p>
</footer>
</main>
<!-- Decorative Elements (Ambient Atmospheric Effects) -->
<div class="fixed top-0 right-0 p-lg pointer-events-none opacity-20 hidden md:block">
<div class="w-[300px] h-[300px] bg-primary-container rounded-full blur-[120px]"></div>
</div>
<div class="fixed bottom-0 left-0 p-lg pointer-events-none opacity-10 hidden md:block">
<div class="w-[200px] h-[200px] bg-secondary-container rounded-full blur-[100px]"></div>
</div>
<script>
        // Simple animation logic for ambient background shift
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            const card = document.querySelector('.glass-card');
            if (card) {
                card.style.transform = `perspective(1000px) rotateX(${(y - 0.5) * 2}deg) rotateY(${(x - 0.5) * -2}deg)`;
            }
        });
    </script>
</body></html>
