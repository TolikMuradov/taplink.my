</div>
</div>
</div>
<div class="flex flex-col gap-sm">

<a class="flex flex-col items-center gap-1 text-on-surface-variant transition-all duration-200" href="#">

</a>
<a class="flex flex-col items-center gap-1 text-on-surface-variant transition-all duration-200" href="#">
<span class="material-symbols-outlined text-[24px]" data-icon="settings">settings</span>

</a>

<script>
        // Micro-interactions for inputs
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.classList.add('scale-[1.01]');
            });
            el.addEventListener('blur', () => {
                el.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
