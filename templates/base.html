<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}taplink.my{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}One page for everything. Share your TikTok, Shopee, LINE and more — all in one link.{% endblock %}">

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":                   "#c0c1ff",
            "on-primary":                "#1000a9",
            "primary-container":         "#8083ff",
            "on-primary-container":      "#0d0096",
            "primary-fixed":             "#e1e0ff",
            "primary-fixed-dim":         "#c0c1ff",
            "on-primary-fixed":          "#07006c",
            "on-primary-fixed-variant":  "#2f2ebe",
            "inverse-primary":           "#494bd6",
            "secondary":                 "#c0c1ff",
            "on-secondary":              "#292a60",
            "secondary-container":       "#42447b",
            "on-secondary-container":    "#b2b3f2",
            "secondary-fixed":           "#e1e0ff",
            "secondary-fixed-dim":       "#c0c1ff",
            "on-secondary-fixed":        "#13144a",
            "on-secondary-fixed-variant":"#404178",
            "tertiary":                  "#ffb783",
            "on-tertiary":               "#4f2500",
            "tertiary-container":        "#d97721",
            "on-tertiary-container":     "#452000",
            "tertiary-fixed":            "#ffdcc5",
            "tertiary-fixed-dim":        "#ffb783",
            "on-tertiary-fixed":         "#301400",
            "on-tertiary-fixed-variant": "#703700",
            "error":                     "#ffb4ab",
            "on-error":                  "#690005",
            "error-container":           "#93000a",
            "on-error-container":        "#ffdad6",
            "background":                "#13131b",
            "on-background":             "#e4e1ed",
            "surface":                   "#13131b",
            "surface-dim":               "#13131b",
            "surface-bright":            "#393841",
            "surface-container-lowest":  "#0d0d15",
            "surface-container-low":     "#1b1b23",
            "surface-container":         "#1f1f27",
            "surface-container-high":    "#292932",
            "surface-container-highest": "#34343d",
            "on-surface":                "#e4e1ed",
            "on-surface-variant":        "#c7c4d7",
            "inverse-surface":           "#e4e1ed",
            "inverse-on-surface":        "#303038",
            "outline":                   "#908fa0",
            "outline-variant":           "#464554",
            "surface-tint":              "#c0c1ff",
            "surface-variant":           "#34343d",
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg":      "0.5rem",
            "xl":      "0.75rem",
            "full":    "9999px",
          },
          spacing: {
            "xs":            "0.25rem",
            "sm":            "0.5rem",
            "md":            "1rem",
            "lg":            "1.5rem",
            "xl":            "2rem",
            "2xl":           "3rem",
            "gutter":        "1rem",
            "container-max": "640px",
          },
          fontFamily: {
            "display":             ["Inter"],
            "headline-lg":         ["Inter"],
            "headline-lg-mobile":  ["Inter"],
            "headline-md":         ["Inter"],
            "body-lg":             ["Inter"],
            "body-md":             ["Inter"],
            "body-sm":             ["Inter"],
            "label-md":            ["Inter"],
          },
          fontSize: {
            "display":            ["48px",  { lineHeight: "1.1",  letterSpacing: "-0.02em", fontWeight: "700" }],
            "headline-lg":        ["32px",  { lineHeight: "1.2",  letterSpacing: "-0.01em", fontWeight: "700" }],
            "headline-lg-mobile": ["24px",  { lineHeight: "1.2",  fontWeight: "700" }],
            "headline-md":        ["24px",  { lineHeight: "1.3",  fontWeight: "600" }],
            "body-lg":            ["18px",  { lineHeight: "1.5",  fontWeight: "400" }],
            "body-md":            ["16px",  { lineHeight: "1.5",  fontWeight: "400" }],
            "body-sm":            ["14px",  { lineHeight: "1.4",  fontWeight: "400" }],
            "label-md":           ["12px",  { lineHeight: "1",    letterSpacing: "0.05em", fontWeight: "600" }],
          },
        },
      },
    }
  </script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #e4e1ed;
    }
    .brand-glow {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }
    .brand-glow-hover:hover {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.35);
    }
    .glass-card {
      background: rgba(27, 27, 35, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(144, 143, 160, 0.2);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    [x-cloak] { display: none !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #464554; border-radius: 10px; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen selection:bg-primary-container selection:text-on-primary-container">

  {% block body %}{% endblock %}

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <script>
    function showToast(message, type) {
      const bg = { success: 'bg-green-600', error: 'bg-error', warning: 'bg-tertiary' };
      const t = document.createElement('div');
      t.className = `${bg[type] || bg.success} text-white px-4 py-3 rounded-lg shadow-lg text-body-sm font-body-sm pointer-events-auto transition-all duration-300 opacity-0 translate-y-1`;
      t.textContent = message;
      document.getElementById('toast-container').appendChild(t);
      requestAnimationFrame(() => t.classList.remove('opacity-0', 'translate-y-1'));
      setTimeout(() => { t.classList.add('opacity-0', 'translate-y-1'); setTimeout(() => t.remove(), 300); }, 3000);
    }
    {% with messages=messages %}{% for message in messages %}
    showToast("{{ message|escapejs }}", "{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}success{% endif %}");
    {% endfor %}{% endwith %}
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
