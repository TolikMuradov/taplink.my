<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}taplink.my{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}One page for everything. Share your TikTok, Shopee, LINE and more — all in one link.{% endblock %}">

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary":                   "#c0c1ff",
            "on-primary":                "#1000a9",
            "primary-container":         "#8083ff",
            "on-primary-container":      "#0d0096",
            "primary-fixed":             "#e1e0ff",
            "primary-fixed-dim":         "#c0c1ff",
            "on-primary-fixed":          "#07006c",
            "on-primary-fixed-variant":  "#2f2ebe",
            "inverse-primary":           "#494bd6",
            "secondary":                 "#c0c1ff",
            "on-secondary":              "#292a60",
            "secondary-container":       "#42447b",
            "on-secondary-container":    "#b2b3f2",
            "secondary-fixed":           "#e1e0ff",
            "secondary-fixed-dim":       "#c0c1ff",
            "on-secondary-fixed":        "#13144a",
            "on-secondary-fixed-variant":"#404178",
            "tertiary":                  "#ffb783",
            "on-tertiary":               "#4f2500",
            "tertiary-container":        "#d97721",
            "on-tertiary-container":     "#452000",
            "tertiary-fixed":            "#ffdcc5",
            "tertiary-fixed-dim":        "#ffb783",
            "on-tertiary-fixed":         "#301400",
            "on-tertiary-fixed-variant": "#703700",
            "error":                     "#ffb4ab",
            "on-error":                  "#690005",
            "error-container":           "#93000a",
            "on-error-container":        "#ffdad6",
            "background":                "#13131b",
            "on-background":             "#e4e1ed",
            "surface":                   "#13131b",
            "surface-dim":               "#13131b",
            "surface-bright":            "#393841",
            "surface-container-lowest":  "#0d0d15",
            "surface-container-low":     "#1b1b23",
            "surface-container":         "#1f1f27",
            "surface-container-high":    "#292932",
            "surface-container-highest": "#34343d",
            "on-surface":                "#e4e1ed",
            "on-surface-variant":        "#c7c4d7",
            "inverse-surface":           "#e4e1ed",
            "inverse-on-surface":        "#303038",
            "outline":                   "#908fa0",
            "outline-variant":           "#464554",
            "surface-tint":              "#c0c1ff",
            "surface-variant":           "#34343d",
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg":      "0.5rem",
            "xl":      "0.75rem",
            "full":    "9999px",
          },

            "xs":            "0.25rem",
            "sm":            "0.5rem",
            "md":            "1rem",
            "lg":            "1.5rem",

            "2xl":           "3rem",

            "headline-lg-mobile": ["24px",  { lineHeight: "1.2",  fontWeight: "700" }],

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #e4e1ed;
    }
    .brand-glow {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
    }
    .brand-glow-hover:hover {
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.35);
    }
    .glass-card {
      background: rgba(27, 27, 35, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(144, 143, 160, 0.2);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .glass-card:hover {
      border-color: rgba(192, 193, 255, 0.18);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    [x-cloak] { display: none !important; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #464554; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }

    /* ── Page entry ── */
    @keyframes page-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    body { animation: page-in 0.32s cubic-bezier(0.16, 1, 0.3, 1) both; }

    /* ── Smooth scroll ── */
    html { scroll-behavior: smooth; }

    /* ── Focus ring ── */
    *:focus-visible {
      outline: 2px solid rgba(192, 193, 255, 0.7);
      outline-offset: 2px;
      border-radius: 6px;
    }
    input:focus, textarea:focus, select:focus {
      box-shadow: 0 0 0 3px rgba(192, 193, 255, 0.06);
    }

    /* ── Button active press feedback ── */
    button:active:not(:disabled),
    a.btn-press:active {
      transform: scale(0.97);
    }
    button { transition: transform 0.08s ease, opacity 0.15s ease, colors 0.15s ease; }

    /* ── Float animation ── */
    @keyframes float-y {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }
    .animate-float { animation: float-y 4s ease-in-out infinite; }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.55s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-d1 { transition-delay: 0.08s; }
    .reveal-d2 { transition-delay: 0.17s; }
    .reveal-d3 { transition-delay: 0.26s; }

    /* ── Shimmer ── */
    .shimmer {
      background: linear-gradient(90deg, rgba(192,193,255,0) 0%, rgba(192,193,255,0.08) 50%, rgba(192,193,255,0) 100%);
      background-size: 200% 100%;
      animation: shimmer 2.5s infinite linear;
    }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── Stagger hero ── */
    .hero-item {
      opacity: 0;
      transform: translateY(14px);
      animation: page-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .hero-d1 { animation-delay: 0.05s; }
    .hero-d2 { animation-delay: 0.12s; }
    .hero-d3 { animation-delay: 0.20s; }
    .hero-d4 { animation-delay: 0.28s; }

    /* ── Modal spring ── */
    @keyframes modal-spring {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    .animate-modal { animation: modal-spring 0.22s cubic-bezier(0.34, 1.4, 0.64, 1) both; }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen selection:bg-primary-container selection:text-on-primary-container">

  {% block body %}{% endblock %}

  <!-- Toast container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none"></div>

  <script>
    function showToast(message, type = 'success') {
      const cfg = {
        success: { bg: '#16a34a', icon: 'check_circle' },
        error:   { bg: '#b91c1c', icon: 'error' },
        warning: { bg: '#b45309', icon: 'warning' },
      };
      const { bg, icon } = cfg[type] || cfg.success;
      const t = document.createElement('div');
      t.className = 'flex items-center gap-3 text-white pl-4 pr-5 py-3 rounded-xl shadow-2xl text-sm font-medium pointer-events-auto max-w-xs';
      t.style.cssText = `background:${bg}ee;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.12);opacity:0;transform:translateX(14px) scale(0.95);`;
      t.innerHTML = `<span class="material-symbols-outlined text-lg shrink-0" style="font-variation-settings:'FILL' 1">${icon}</span><span>${message}</span>`;
      document.getElementById('toast-container').appendChild(t);
      // Spring in
      requestAnimationFrame(() => requestAnimationFrame(() => {
        t.style.transition = 'opacity 0.25s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
        t.style.opacity = '1';
        t.style.transform = 'none';
      }));
      // Fade out
      setTimeout(() => {
        t.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
        t.style.opacity = '0';
        t.style.transform = 'translateX(14px) scale(0.95)';
        setTimeout(() => t.remove(), 210);
      }, 3300);
    }
    {% with messages=messages %}{% for message in messages %}
    showToast("{{ message|escapejs }}", "{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% else %}success{% endif %}");
    {% endfor %}{% endwith %}
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
